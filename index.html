function kickHead(head,mx,my){var dx=head.x-mx,dy=head.y-my,dist=Math.sqrt(dx*dx+dy*dy)||1,force=15+Math.random()*10;head.dx=(dx/dist)*force;head.dy=(dy/dist)*force;head.rotSpeed=(Math.random()-0.5)*0.4;head.kicked=true;head.kickTimer=200;kickCount++;comboCount++;clearTimeout(comboTimer);comboTimer=setTimeout(function(){comboCount=0;updateCombo();},1500);var pts=comboCount*100;score+=pts;document.getElementById("score").textContent=score;document.getElementById("kicks").textContent=kickCount;updateCombo();spawnParticles(head.x,head.y);addFT(head.x,head.y-head.size,comboCount>1?"x"+comboCount+" +"+pts:"+"+pts,comboCount>2?"#ffd700":"#fff");showBubble(head,RENT_QUOTES[Math.floor(Math.random()*RENT_QUOTES.length)]);if(kickCount===20){document.getElementById("finish-btn").style.display="block";document.getElementById("instructions").innerHTML="You unlocked the QUIZ!<br><span style='color:#ffd700'>Click TAKE THE QUIZ or keep kicking!</span>";}if(kickCount%5===0)triggerDance();else showOneLiner();}
function updateCombo(){var el=document.getElementById("combo");if(comboCount>1){el.style.display="block";el.textContent="COMBO x"+comboCount+"!";}else el.style.display="none";}
function showOneLiner(){var el=document.getElementById("oneliner");el.textContent='"'+ONE_LINERS[Math.floor(Math.random()*ONE_LINERS.length)]+'"';el.style.display="block";clearTimeout(window._oneT);window._oneT=setTimeout(function(){el.style.display="none";},3000);}
function showAntiRent(dance){var el=document.getElementById("anti-rent-banner");el.textContent="🎤 ""+ANTI_QUOTES[Math.floor(Math.random()*ANTI_QUOTES.length)]+""";el.style.borderColor=dance.color;el.style.display="block";clearTimeout(window._antiT);window._antiT=setTimeout(function(){el.style.display="none";},5000);}
function triggerDance(){if(isDancing)return;isDancing=true;var dance=DANCES[Math.floor(Math.random()*DANCES.length)];var el=document.getElementById("dance-label");el.innerHTML=dance.emoji+" "+dance.decade+" — "+dance.name+" "+dance.emoji;el.style.color=dance.color;el.style.display="block";player.dancing=true;player.dance=dance;player.danceFrame=0;player.danceDuration=180;heads.forEach(function(h){h.dancing=true;h.danceAngle=Math.random()*Math.PI*2;h.danceSpeed=0.05+Math.random()*0.05;});for(var i=0;i<6;i++)(function(j){setTimeout(function(){spawnParticles(Math.random()*canvas.width,Math.random()*canvas.height,"hsl("+(Math.random()*360)+",100%,60%)");},j*150);})(i);setTimeout(function(){el.style.display="none";heads.forEach(function(h){h.dancing=false;});player.dancing=false;isDancing=false;showAntiRent(dance);},3100);}
canvas.addEventListener("click",function(e){if(!gameRunning)return;var rect=canvas.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top,hit=false;for(var i=heads.length-1;i>=0;i--){var h=heads[i];if(Math.sqrt(Math.pow(h.x-mx,2)+Math.pow(h.y-my,2))<h.size){kickHead(h,mx,my);hit=true;break;}}if(!hit){spawnParticles(mx,my,"#ff0000");addFT(mx,my,"MISS!","#ff4444");comboCount=0;updateCombo();}});
function drawHead(h){ctx.save();ctx.translate(h.x,h.y);ctx.rotate(h.rotation);ctx.beginPath();ctx.arc(4,4,h.size,0,Math.PI*2);ctx.fillStyle="rgba(0,0,0,0.3)";ctx.fill();ctx.beginPath();ctx.arc(0,0,h.size,0,Math.PI*2);ctx.fillStyle=h.kicked?"#ffcc99":"#ffd1a0";ctx.fill();ctx.strokeStyle=h.kicked?"#c0392b":"#8B4513";ctx.lineWidth=h.kicked?4:3;ctx.stroke();ctx.font=(h.size*1.1)+"px serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(h.kicked?"🗣️":h.emoji,0,2);ctx.restore();}
var spawnTimer=0,frameCount=0;
function gameLoop(){if(!gameRunning){requestAnimationFrame(gameLoop);return;}frameCount++;ctx.clearRect(0,0,canvas.width,canvas.height);ctx.strokeStyle="rgba(255,255,255,0.03)";ctx.lineWidth=1;for(var gx=0;gx<canvas.width;gx+=60){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,canvas.height);ctx.stroke();}for(var gy=0;gy<canvas.height;gy+=60){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(canvas.width,gy);ctx.stroke();}spawnTimer++;if(spawnTimer>90&&heads.length<12){spawnHead();spawnTimer=0;}for(var i=heads.length-1;i>=0;i--){var h=heads[i];if(h.dancing){h.danceAngle+=h.danceSpeed;h.x+=Math.cos(h.danceAngle)*3;h.y+=Math.sin(h.danceAngle*1.3)*3;}else{h.x+=h.dx;h.y+=h.dy;h.dx*=0.99;h.dy*=0.99;}h.rotation+=h.rotSpeed;if(h.x-h.size<0){h.x=h.size;h.dx=Math.abs(h.dx);}if(h.x+h.size>canvas.width){h.x=canvas.width-h.size;h.dx=-Math.abs(h.dx);}if(h.y-h.size<0){h.y=h.size;h.dy=Math.abs(h.dy);}if(h.y+h.size>canvas.height){h.y=canvas.height-h.size;h.dy=-Math.abs(h.dy);}if(h.kickTimer>0)h.kickTimer--;drawHead(h);if(!h.kicked&&!h.dancing&&(h.x<-200||h.x>canvas.width+200||h.y<-200||h.y>canvas.height+200))heads.splice(i,1);}for(var pi=particles.length-1;pi>=0;pi--){var p=particles[pi];p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life-=p.decay;if(p.life<=0){particles.splice(pi,1);continue;}ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fillStyle=p.color;ctx.globalAlpha=p.life;ctx.fill();ctx.globalAlpha=1;}for(var fi=floatingTexts.length-1;fi>=0;fi--){var ft=floatingTexts[fi];ft.y+=ft.vy;ft.life-=0.02;if(ft.life<=0){floatingTexts.splice(fi,1);continue;}ctx.font="bold "+ft.size+"px Arial";ctx.textAlign="center";ctx.fillStyle=ft.color;ctx.globalAlpha=ft.life;ctx.strokeStyle="#000";ctx.lineWidth=3;ctx.strokeText(ft.text,ft.x,ft.y);ctx.fillText(ft.text,ft.x,ft.y);ctx.globalAlpha=1;}if(player.dancing&&player.dance){player.danceFrame++;var px=canvas.width/2,py=canvas.height-80,grad=ctx.createRadialGradient(px,py+10,10,px,py+10,80);grad.addColorStop(0,player.dance.color+"aa");grad.addColorStop(1,"transparent");ctx.beginPath();ctx.ellipse(px,py+12,75,22,0,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill();ctx.font="bold 15px Arial";ctx.textAlign="center";ctx.fillStyle=player.dance.color;ctx.globalAlpha=0.9;ctx.fillText("YOU",px,py-90);ctx.globalAlpha=1;drawStickFigure(px,py,player.danceFrame,player.dance.move,player.dance.color);if(player.danceFrame>=player.danceDuration){player.dancing=false;player.dance=null;}}updateBubbles();requestAnimationFrame(gameLoop);}
for(var si=0;si<5;si++)(function(j){setTimeout(spawnHead,j*300);})(si);
gameLoop();
</script>
