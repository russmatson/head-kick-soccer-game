nate exclusionary zoning, reduce regulations, and let markets build","A national rent subsidy funded by a landlord windfall tax","Government construction of public housing in all major metros"],"ans":1,"exp":"Heritage argues government-created barriers like single-family zoning, building codes, parking minimums, and lengthy environmental review made housing expensive. Deregulating land use lets the private market build more and drive down costs."},{"src":"ab","lbl":"🏗 Abundance Liberal","q":"Abundance liberals cite Vienna, Austria as a housing success story. What does Vienna do that they support?","opts":["Strict citywide rent control on all private units","Ban on all private landlords","Massive public and social housing construction alongside a permissive private market","Lottery-based housing assignment by income"],"ans":2,"exp":"Vienna builds enormous amounts of social housing, with nearly 60% of residents living in subsidized units, while also allowing a functioning private market. The key is supply, public or private, not price controls on existing units."},{"src":"hf","lbl":"🦅 Heritage Foundation","q":"Heritage Foundation research on NYC rent stabilization found it disproportionately benefits which group?","opts":["Recent low-income immigrants","Long-term tenants, many of whom are wealthier than market-rate renters","Young renters trying to find their first apartment","Residents of high-poverty neighborhoods"],"ans":1,"exp":"Rent-stabilized apartments in NYC are often occupied by long-term residents whose incomes have grown substantially. Meanwhile low-income newcomers face a nearly impossible rental market with few vacancies."},{"src":"ab","lbl":"🏗 Abundance Liberal","q":"Minneapolis abolished single-family-only zoning in its 2040 Plan. What happened to rents compared to peer cities?","opts":["Rents rose faster than peers","Rents stayed exactly the same","Rents fell significantly relative to peer cities as more units were built","Rents fell only in wealthy ne stroke();ctx.beginPath();ctx.moveTo(0,-s*1.4);ctx.lineTo(Math.cos(lA)*s*1.1,-s*1.4+Math.sin(lA)*s*1.1);ctx.stroke();ctx.beginPath();ctx.moveTo(0,-s*1.4);ctx.lineTo(Math.cos(rA)*s*1.1,-s*1.4+Math.sin(rA)*s*1.1);ctx.stroke();ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(Math.PI/2+lL)*s,Math.sin(Math.PI/2+lL)*s);ctx.stroke();ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(Math.PI/2+rL)*s,Math.sin(Math.PI/2+rL)*s);ctx.stroke();ctx.restore();}
