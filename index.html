var QS=[
  {src:"ab",lbl:"🏗 Abundance Liberal",q:"A city faces a housing crisis. From an abundance liberal perspective, what is the most effective long-term solution?",opts:["Expand rent control to cover all units built after 1990","Upzone neighborhoods, streamline permitting, and build far more housing supply","Impose vacancy taxes and ban short-term rentals only","Freeze all construction until rents stabilize"],ans:1,exp:"Abundance liberals argue housing scarcity is the root cause. The answer is dramatically increasing supply through zoning reform and faster permitting — not price controls that reduce the incentive to build."},
  {src:"hf",lbl:"🦅 Heritage Foundation",q:"According to Heritage Foundation economists, what does rent control primarily accomplish?",opts:["It ensures low-income families can afford rent forever","It reduces housing supply and quality while creating insider-outsider inequities","It stabilizes neighborhoods without affecting new construction","It is effective short-term with no long-term downsides"],ans:1,exp:"Heritage scholars argue rent control is a textbook price ceiling: it reduces supply as landlords convert units or let them deteriorate, benefiting current tenants at the expense of future renters who cannot find housing at all."},
  {src:"ab",lbl:"🏗 Abundance Liberal",q:"A Stanford study (Diamond et al. 2019) found SF rent control caused landlords to reduce rental housing supply by roughly how much?",opts:["About 2%","About 7%","About 15%","About 30%"],ans:2,exp:"The Diamond et al. Stanford study found rent control reduced rental supply by roughly 15% as landlords converted apartments to condos or redeveloped. It protected existing tenants but worsened the overall affordability crisis."},
  {src:"hf",lbl:"🦅 Heritage Foundation",q:"From a Heritage Foundation free-market perspective, what government policy would best improve housing affordability?",opts:["Federal rent control applying to all cities","Eliminate exclusionary zoning, reduce regulations, and let markets build","A national rent subsidy funded by a landlord windfall tax","Government construction of public housing in all major metros"],ans:1,exp:"Heritage argues that government-created barriers — single-family zoning, building codes, parking minimums, lengthy environmental review — made housing expensive. Deregulating land use lets the private market build more and drive down costs."},
  {src:"ab",lbl:"🏗 Abundance Liberal",q:"Abundance liberals cite Vienna, Austria as a housing success story. What does Vienna do that they support?",opts:["Strict citywide rent control on all private units","Ban on all private landlords","Massive public and social housing construction alongside a permissive private market","Lottery-based housing assignment by income"],ans:2,exp:"Vienna builds enormous amounts of social housing (60% of residents live in subsidized units) while allowing a functioning private market. The key is supply — public OR private — not price controls on existing units."},
  {src:"hf",lbl:"🦅 Heritage Foundation",q:"Heritage Foundation research on NYC rent stabilization found it disproportionately benefits which group?",opts:["Recent low-income immigrants","Long-term tenants — many of whom are wealthier than market-rate renters","Young renters trying to find their first apartment","Residents of high-poverty neighborhoods"],ans:1,exp:"Rent-stabilized apartments in NYC are often occupied by long-term residents whose incomes have grown substantially. Meanwhile low-income newcomers face a nearly impossible rental market."},
  {src:"ab",lbl:"🏗 Abundance Liberal",q:"Minneapolis abolished single-family-only zoning in its 2040 Plan. What happened to rents compared to peer cities?",opts:["Rents rose faster than peers","Rents stayed exactly the same","Rents fell significantly relative to peer cities as more units were built","Rents fell only in wealthy neighborhoods"],ans:2,exp:"Studies found Minneapolis rents grew much slower relative to comparable Midwestern cities after zoning reform spurred new construction. More supply = more affordability. No rent control required."},
  {src:"hf",lbl:"🦅 Heritage Foundation",q:"Economists across MIT, Princeton, and Stanford largely agree on rent control. What is their consensus?",opts:["Rent control is effective when carefully applied","Rent control benefits tenants but harms landlords in a zero-sum way","Rent control reduces housing supply and quality, harming long-run affordability","The evidence is too mixed to draw conclusions"],ans:2,exp:"A 2012 IGM Forum survey found near-universal agreement that rent control reduces the quantity and quality of housing. While it helps incumbent tenants short-term, it worsens affordability for everyone else — across the ideological spectrum."},
];
var quizDone=0;
function showQuiz(){running=false;document.getElementById("quiz-screen").style.display="block";document.getElementById("finish-btn").style.display="none";quizDone=0;var c=document.getElementById("quiz-questions");c.innerHTML="";document.getElementById("quiz-result").style.display="none";QS.forEach(function(q,i){var b=document.createElement("div");b.className="q-block";var s=document.createElement("div");s.className="q-src "+(q.src==="ab"?"src-ab":"src-hf");s.textContent=q.lbl;b.appendChild(s);var qt=document.createElement("div");qt.className="q-text";qt.textContent="Q"+(i+1)+". "+q.q;b.appendChild(qt);q.opts.forEach(function(o,oi){var btn=document.createElement("button");btn.className="q-opt";btn.textContent=String.fromCharCode(65+oi)+". "+o;(function(idx,chosen,block,qq){btn.onclick=function(){ansQ(idx,chosen,block,qq);};})(i,oi,b,q);b.appendChild(btn);});var ex=document.createElement("div");ex.className="q-exp";ex.id="ex"+i;ex.textContent=q.exp;b.appendChild(ex);c.appendChild(b);});}
function ansQ(qi,ch,block,q){var btns=block.querySelectorAll(".q-opt");btns.forEach(function(b){b.disabled=true;});btns[ch].classList.add(ch===q.ans?"correct":"wrong");if(ch!==q.ans)btns[q.ans].classList.add("correct");document.getElementById("ex"+qi).style.display="block";if(ch===q.ans)quizDone++;var done=document.querySelectorAll(".q-exp[style*=block]").length;if(done>=QS.length)showResult();}
function showResult(){var p=Math.round((quizDone/QS.length)*100),ti,tx;if(p>=88){ti="🏆 HOUSING ECONOMIST! ("+quizDone+"/"+QS.length+")";tx="You understand why rent control fails — it reduces supply, creates inequality, and worsens the very crisis it claims to solve. Both abundance liberals and market conservatives agree: build more housing!";}else if(p>=60){ti="📈 PRETTY GOOD! ("+quizDone+"/"+QS.length+")";tx="Solid understanding! Rent control helps current tenants at the cost of future renters and overall supply. The real fix — progressive or libertarian — is more homes.";}else if(p>=38){ti="📚 NEEDS MORE READING ("+quizDone+"/"+QS.length+")";tx="Price controls tend to reduce supply of the very thing you want to make affordable. Check out Jenny Schuetz, Jerusalem Demsas, or Cato/Heritage housing research.";}else{ti="🏠 THE HEADS CONVINCED YOU ("+quizDone+"/"+QS.length+")";tx="Those disembodied heads got to you! 97% of economists, left to right, think rent control makes housing markets worse. Start with Stanford's Diamond et al. 2019 study!";}document.getElementById("r-title").textContent=ti;document.getElementById("r-text").textContent=tx;var r=document.getElementById("quiz-result");r.style.display="block";r.scrollIntoView({behavior:"smooth"});}
function restartGame(){document.getElementById("quiz-screen").style.display="none";score=0;kickCount=0;comboCount=0;heads=[];particles=[];floats=[];bubbles.forEach(function(b){b.el.remove();});bubbles.length=0;document.getElementById("score").textContent="0";document.getElementById("kicks").textContent="0";document.getElementById("finish-btn").style.display="none";running=true;for(var i=0;i<5;i++)(function(j){setTimeout(spawnHead,j*300);})(i);}
var player={dancing:false,dance:null,f:0,dur:180};
function drawFigure(x,y,t,move,col){ctx.save();ctx.strokeStyle=col||"#fff";ctx.lineWidth=3;ctx.lineCap="round";var s=28,lA=-Math.PI/4,rA=-Math.PI*3/4,lL=Math.PI/8,rL=-Math.PI/8,tilt=0,hip=0,bv=Math.sin(t*0.3)*4;if(move==="twist"){tilt=Math.sin(t*0.2)*0.3;hip=Math.sin(t*0.2)*10;lA=-Math.PI/3+Math.sin(t*0.2)*0.5;rA=-Math.PI*2/3+Math.sin(t*0.2)*0.5;lL=Math.PI/5+Math.sin(t*0.2)*0.2;rL=-Math.PI/5-Math.sin(t*0.2)*0.2;}else if(move==="mash"){lL=Math.PI/4+Math.sin(t*0.25)*0.3;rL=-Math.PI/4-Math.sin(t*0.25)*0.3;lA=-Math.PI/2+Math.cos(t*0.25)*0.4;rA=-Math.PI/2-Math.cos(t*0.25)*0.4;hip=Math.sin(t*0.5)*6;}else if(move==="disco"){var ph=Math.floor(t/15)%2;lA=ph===0?-Math.PI*0.9:-Math.PI/6;rA=ph===0?-Math.PI/6:-Math.PI*0.9;hip=Math.sin(t*0.3)*8;}else if(move==="run"){lA=-Math.PI/2+Math.sin(t*0.4)*0.6;rA=-Math.PI/2-Math.sin(t*0.4)*0.6;lL=Math.PI/3*Math.sin(t*0.4+Math.PI);rL=Math.PI/3*Math.sin(t*0.4);hip=Math.sin(t*0.4)*5;}else if(move==="macarena"){var st=Math.floor(t/12)%8;if(st===0){lA=-Math.PI/6;rA=-Math.PI*5/6;}else if(st===1){lA=rA=-Math.PI/6;}else if(st===2){lA=-Math.PI/2;rA=-Math.PI/6;}else if(st===3){lA=rA=-Math.PI/2;}else if(st===4){lA=-Math.PI*3/4;rA=-Math.PI/2;}else if(st===5){lA=rA=-Math.PI*3/4;}else{lA=rA=-Math.PI/2;hip=12;}lL=Math.PI/10;rL=-Math.PI/10;}else if(move==="soulja"){lA=rA=-Math.PI/2+Math.sin(t*0.3)*0.15;tilt=Math.sin(t*0.2)*0.15;lL=Math.PI/6+Math.sin(t*0.35)*0.3;rL=-Math.PI/6-Math.sin(t*0.35)*0.3;hip=Math.sin(t*0.35)*7;}else if(move==="floss"){var fp=Math.sin(t*0.25);lA=rA=-Math.PI/2+fp;hip=fp*14;lL=Math.PI/10;rL=-Math.PI/10;}else if(move==="griddy"){lL=Math.PI/3*Math.max(0,Math.sin(t*0.35+Math.PI));rL=Math.PI/3*Math.max(0,Math.sin(t*0.35));lA=-Math.PI/2-Math.sin(t*0.35+Math.PI)*0.5;rA=-Math.PI/2+Math.sin(t*0.35+Math.PI)*0.5;hip=Math.sin(t*0.35)*6;tilt=Math.sin(t*0.35)*0.08;}ctx.translate(x+hip,y+bv);ctx.rotate(tilt);ctx.beginPath();ctx.arc(0,-s*2.2,s*0.5,0,Math.PI*2);ctx.fillStyle="#ffe0b2";ctx.fill();ctx.stroke();ctx.fillStyle="#333";ctx.beginPath();ctx.arc(-7,-s*2.35,2.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(7,-s*2.35,2.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(0,-s*2.1,8,0.1,Math.PI-0.1);ctx.stroke();ctx.beginPath();ctx.moveTo(0,-s*1.7);ctx.lineTo(0,0);ctx.stroke();ctx.beginPath();ctx.moveTo(0,-s*1.4);ctx.lineTo(Math.cos(lA)*s*1.1,-s*1.4+Math.sin(lA)*s*1.1);ctx.stroke();ctx.beginPath();ctx.moveTo(0,-s*1.4);ctx.lineTo(Math.cos(rA)*s*1.1,-s*1.4+Math.sin(rA)*s*1.1);ctx.stroke();ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(Math.PI/2+lL)*s,Math.sin(Math.PI/2+lL)*s);ctx.stroke();ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(Math.PI/2+rL)*s,Math.sin(Math.PI/2+rL)*s);ctx.stroke();ctx.restore();}
function addBubble(h,t){var el=document.createElement("div");el.className="speech-bubble";el.textContent=t;document.body.appendChild(el);bubbles.push({el:el,h:h,at:Date.now(),dur:4200});}
function updBubbles(){var now=Date.now();for(var i=bubbles.length-1;i>=0;i--){var b=bubbles[i],age=now-b.at;if(age>b.dur){b.el.remove();bubbles.splice(i,1);continue;}if(age>b.dur-500)b.el.style.opacity=((b.dur-age)/500).toFixed(2);var hw=b.el.offsetWidth||200,hh=b.el.offsetHeight||60;b.el.style.left=(b.h.x-hw/2)+"px";b.el.style.top=(b.h.y-b.h.size-hh-14)+"px";}}
function spawnHead(){if(!running)return;var sz=50+Math.random()*40,em=EMOJIS[Math.floor(Math.random()*EMOJIS.length)],sd=Math.floor(Math.random()*4),x,y;if(sd===0){x=-sz;y=Math.random()*canvas.height;}else if(sd===1){x=canvas.width+sz;y=Math.random()*canvas.height;}else if(sd===2){x=Math.random()*canvas.width;y=-sz;}else{x=Math.random()*canvas.width;y=canvas.height+sz;}var tx=canvas.width*0.3+Math.random()*canvas.width*0.4,ty=canvas.height*0.3+Math.random()*canvas.height*0.4;heads.push({x:x,y:y,sz:sz,dx:(tx-x)/(100+Math.random()*100),dy:(ty-y)/(100+Math.random()*100),em:em,rot:0,rs:(Math.random()-0.5)*0.1,kicked:false});}
function spawnParticles(x,y,col){for(var i=0;i<20;i++){var a=Math.random()*Math.PI*2,sp=3+Math.random()*8;particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:0.03+Math.random()*0.04,sz:4+Math.random()*8,col:col||("hsl("+(Math.random()*360)+",100%,60%)")});}}
function addFloat(x,y,txt,col){floats.push({x:x,y:y,txt:txt,col:col||"#fff",life:1,vy:-2,sz:24});}
function kick(h,mx,my){var dx=h.x-mx,dy=h.y-my,dist=Math.sqrt(dx*dx+dy*dy)||1,f=15+Math.random()*10;h.dx=(dx/dist)*f;h.dy=(dy/dist)*f;h.rs=(Math.random()-0.5)*0.4;h.kicked=true;h.kt=200;kickCount++;comboCount++;clearTimeout(comboTimer);comboTimer=setTimeout(function(){comboCount=0;updCombo();},1500);var pts=comboCount*100;score+=pts;document.getElementById("score").textContent=score;document.getElementById("kicks").textContent=kickCount;updCombo();spawnParticles(h.x,h.y);addFloat(h.x,h.y-h.sz,comboCount>1?"x"+comboCount+" +"+pts:"+"+pts,comboCount>2?"#ffd700":"#fff");addBubble(h,RQUOTES[Math.floor(Math.random()*RQUOTES.length)]);if(kickCount===20){document.getElementById("finish-btn").style.display="block";document.getElementById("instructions").innerHTML="You unlocked the QUIZ!<br><span style='color:#ffd700'>Click TAKE THE QUIZ or keep kicking!</span>";}if(kickCount%5===0)doDance();else showLine();}

function showLine(){var el=document.getElementById("oneliner");el.textContent='"'+OLINERS[Math.floor(Math.random()*OLINERS.length)]+'"';el.style.display="block";clearTimeout(window._ot);window._ot=setTimeout(function(){el.style.display="none";},2800);}
function showAntiRent(da){var el=document.getElementById("anti-rent-banner");el.textContent=AQUOTES[Math.floor(Math.random()*AQUOTES.length)];el.style.borderColor=da.c;el.style.display="block";clearTimeout(window._at);window._at=setTimeout(function(){el.style.display="none";},5000);}
function doDance(){if(isDancing)return;isDancing=true;var da=DANCES[Math.floor(Math.random()*DANCES.length)];var el=document.getElementById("dance-label");el.textContent=da.d+" — "+da.n;el.style.color=da.c;el.style.display="block";player.dancing=true;player.dance=da;player.f=0;player.dur=180;heads.forEach(function(h){h.dancing=true;h.da=Math.random()*Math.PI*2;h.ds=0.05+Math.random()*0.05;});for(var i=0;i<6;i++)(function(j){setTimeout(function(){spawnParticles(Math.random()*canvas.width,Math.random()*canvas.height,"hsl("+(Math.random()*360)+",100%,60%)");},j*150);})(i);setTimeout(function(){el.style.display="none";heads.forEach(function(h){h.dancing=false;});player.dancing=false;isDancing=false;showAntiRent(da);},3100);}
canvas.addEventListener("click",function(e){if(!running)return;var rect=canvas.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top,hit=false;for(var i=heads.length-1;i>=0;i--){var h=heads[i];if(Math.sqrt((h.x-mx)*(h.x-mx)+(h.y-my)*(h.y-my))<h.sz){kick(h,mx,my);hit=true;break;}}if(!hit){spawnParticles(mx,my,"#f00");addFloat(mx,my,"MISS!","#f44");comboCount=0;updCombo();}});
function drawHead(h){ctx.save();ctx.translate(h.x,h.y);ctx.rotate(h.rot);ctx.beginPath();ctx.arc(4,4,h.sz,0,Math.PI*2);ctx.fillStyle="rgba(0,0,0,0.3)";ctx.fill();ctx.beginPath();ctx.arc(0,0,h.sz,0,Math.PI*2);ctx.fillStyle=h.kicked?"#ffcc99":"#ffd1a0";ctx.fill();ctx.strokeStyle=h.kicked?"#c0392b":"#8B4513";ctx.lineWidth=h.kicked?4:3;ctx.stroke();ctx.font=(h.sz*1.1)+"px serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(h.kicked?"🗣":h.em,0,2);ctx.restore();}
var sTmr=0;
function loop(){if(!running){requestAnimationFrame(loop);return;}ctx.clearRect(0,0,canvas.width,canvas.height);ctx.strokeStyle="rgba(255,255,255,0.03)";ctx.lineWidth=1;for(var gx=0;gx<canvas.width;gx+=60){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,canvas.height);ctx.stroke();}for(var gy=0;gy<canvas.height;gy+=60){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(canvas.width,gy);ctx.stroke();}sTmr++;if(sTmr>90&&heads.length<12){spawnHead();sTmr=0;}for(var i=heads.length-1;i>=0;i--){var h=heads[i];if(h.dancing){h.da+=h.ds;h.x+=Math.cos(h.da)*3;h.y+=Math.sin(h.da*1.3)*3;}else{h.x+=h.dx;h.y+=h.dy;h.dx*=0.99;h.dy*=0.99;}h.rot+=h.rs;if(h.x-h.sz<0){h.x=h.sz;h.dx=Math.abs(h.dx);}if(h.x+h.sz>canvas.width){h.x=canvas.width-h.sz;h.dx=-Math.abs(h.dx);}if(h.y-h.sz<0){h.y=h.sz;h.dy=Math.abs(h.dy);}if(h.y+h.sz>canvas.height){h.y=canvas.height-h.sz;h.dy=-Math.abs(h.dy);}if(h.kt>0)h.kt--;drawHead(h);if(!h.kicked&&!h.dancing&&(h.x<-200||h.x>canvas.width+200||h.y<-200||h.y>canvas.height+200))heads.splice(i,1);}for(var pi=particles.length-1;pi>=0;pi--){var p=particles[pi];p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life-=p.decay;if(p.life<=0){particles.splice(pi,1);continue;}ctx.beginPath();ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);ctx.fillStyle=p.col;ctx.globalAlpha=p.life;ctx.fill();ctx.globalAlpha=1;}for(var fi=floats.length-1;fi>=0;fi--){var ft=floats[fi];ft.y+=ft.vy;ft.life-=0.02;if(ft.life<=0){floats.splice(fi,1);continue;}ctx.font="bold "+ft.sz+"px Arial";ctx.textAlign="center";ctx.fillStyle=ft.col;ctx.globalAlpha=ft.life;ctx.strokeStyle="#000";ctx.lineWidth=3;ctx.strokeText(ft.txt,ft.x,ft.y);ctx.fillText(ft.txt,ft.x,ft.y);ctx.globalAlpha=1;}if(player.dancing&&player.dance){player.f++;var px=canvas.width/2,py=canvas.height-80,gr=ctx.createRadialGradient(px,py+10,10,px,py+10,80);gr.addColorStop(0,player.dance.c+"aa");gr.addColorStop(1,"transparent");ctx.beginPath();ctx.ellipse(px,py+12,75,22,0,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();ctx.font="bold 15px Arial";ctx.textAlign="center";ctx.fillStyle=player.dance.c;ctx.globalAlpha=0.9;ctx.fillText("YOU",px,py-90);ctx.globalAlpha=1;drawFigure(px,py,player.f,player.dance.m,player.dance.c);if(player.f>=player.dur){player.dancing=false;player.dance=null;}}updBubbles();requestAnimationFrame(loop);}
for(var si=0;si<5;si++)(function(j){setTimeout(spawnHead,j*300);})(si);
loop();
