// ---- QUIZ LOGIC ----
let quizAnswers = 0, quizTotal = 0;

function showQuiz() {
  gameRunning = false;
  document.getElementById("quiz-screen").style.display = "block";
  document.getElementById("finish-btn").style.display = "none";
  quizAnswers = 0; quizTotal = QUIZ_QUESTIONS.length;
  const container = document.getElementById("quiz-questions");
  container.innerHTML = "";
  document.getElementById("quiz-result").style.display = "none";
  document.getElementById("quiz-score-bar").style.display = "none";

  QUIZ_QUESTIONS.forEach((q, idx) => {
    const block = document.createElement("div");
    block.className = "q-block";
    const isAbundance = q.source === "abundance";
    block.innerHTML =
      `<div class="source-tag ${isAbundance ? "source-abundance" : "source-heritage"}">${isAbundance ? "🏗️ Abundance Liberal" : "🦅 Heritage Foundation"}</div>` +
      `<div class="q-text">Q${idx+1}. ${q.q}</div>`;
    q.options.forEach((opt, oi) => {
      const btn = document.createElement("button");
      btn.className = "q-option";
      btn.textContent = String.fromCharCode(65+oi) + ". " + opt;
      btn.onclick = function() { answerQuestion(idx, oi, block, q); };
      block.appendChild(btn);
    });
    const explain = document.createElement("div");
    explain.className = "q-explain";
    explain.id = "explain-" + idx;
    explain.textContent = q.explain;
    block.appendChild(explain);
    container.appendChild(block);
  });
}

function answerQuestion(qIdx, chosen, block, q) {
  const btns = block.querySelectorAll(".q-option");
  btns.forEach(b => { b.disabled = true; });
  btns[chosen].classList.add(chosen === q.correct ? "correct" : "wrong");
  if (chosen !== q.correct) btns[q.correct].classList.add("correct");
  document.getElementById("explain-" + qIdx).style.display = "block";
  if (chosen === q.correct) quizAnswers++;
  // Check if all answered
  const allExplains = document.querySelectorAll(".q-explain");
  const answered = Array.from(allExplains).filter(e => e.style.display === "block").length;
  if (answered === quizTotal) showQuizResult();
}

function showQuizResult() {
  const pct = Math.round((quizAnswers / quizTotal) * 100);
  let title, text;
  if (pct >= 88) {
    title = "🏆 HOUSING ECONOMIST! (" + quizAnswers + "/" + quizTotal + ")";
    text = "Impressive! You understand why rent control fails on its own terms — it reduces supply, creates inequality between insiders and outsiders, and worsens the very crisis it claims to solve. Both abundance liberals and market conservatives agree: build more housing!";
  } else if (pct >= 60) {
    title = "📈 PRETTY GOOD! (" + quizAnswers + "/" + quizTotal + ")";
    text = "Solid understanding of housing economics. The key takeaway: rent control helps current tenants at the cost of future renters and overall supply. The real fix — whether you're a progressive or a libertarian — is more homes.";
  } else if (pct >= 38) {
    title = "📚 NEEDS MORE READING (" + quizAnswers + "/" + quizTotal + ")";
    text = "Housing economics is tricky! The counterintuitive truth: price controls tend to reduce the supply of the very thing you're trying to make affordable. Check out work by Jenny Schuetz, Jerusalem Demsas, or the Cato/Heritage housing research for more.";
  } else {
    title = "🏠 THE HEADS HAVE CONVINCED YOU (" + quizAnswers + "/" + quizTotal + ")";
    text = "Those disembodied heads really got to you, huh? Don't worry — it's never too late to learn why 97% of economists, from left to right, think rent control makes housing markets worse. Start with the Stanford Diamond et al. (2019) study!";

  document.getElementById("result-title").textContent = title;
  document.getElementById("result-text").textContent = text;
  result.style.display = "block";
  result.scrollIntoView({ behavior: "smooth", block: "center" });
}

// ---- STICK FIGURE ----
const player = { dancing:false, dance:null, danceFrame:0, danceDuration:180 };

function drawStickFigure(x, y, t, move, color) {
  ctx.save(); ctx.strokeStyle = color||'#fff'; ctx.lineWidth=3; ctx.lineCap='round';
  const s=28; let lA=-Math.PI/4,rA=-Math.PI*3/4,lL=Math.PI/8,rL=-Math.PI/8,tilt=0,hip=0;
  const bounce=Math.sin(t*0.3)*4;
  if(move==='twist'){tilt=Math.sin(t*0.2)*0.3;hip=Math.sin(t*0.2)*10;lA=-Math.PI/3+Math.sin(t*0.2)*0.5;rA=-Math.PI*2/3+Math.sin(t*0.2)*0.5;lL=Math.PI/5+Math.sin(t*0.2)*0.2;rL=-Math.PI/5-Math.sin(t*0.2)*0.2;}
  else if(move==='mash'){lL=Math.PI/4+Math.sin(t*0.25)*0.3;rL=-Math.PI/4-Math.sin(t*0.25)*0.3;lA=-Math.PI/2+Math.cos(t*0.25)*0.4;rA=-Math.PI/2-Math.cos(t*0.25)*0.4;hip=Math.sin(t*0.5)*6;}
  else if(move==='disco'){const ph=Math.floor(t/15)%2;lA=ph===0?-Math.PI*0.9:-Math.PI/6;rA=ph===0?-Math.PI/6:-Math.PI*0.9;lL=Math.PI/6+Math.sin(t*0.3)*0.2;rL=-Math.PI/6-Math.sin(t*0.3)*0.2;hip=Math.sin(t*0.3)*8;}
  else if(move==='run'){lA=-Math.PI/2+Math.sin(t*0.4)*0.6;rA=-Math.PI/2-Math.sin(t*0.4)*0.6;lL=Math.PI/3*Math.sin(t*0.4+Math.PI);rL=Math.PI/3*Math.sin(t*0.4);hip=Math.sin(t*0.4)*5;}
  else if(move==='macarena'){const st=Math.floor(t/12)%8;if(st===0){lA=-Math.PI/6;rA=-Math.PI*5/6;}else if(st===1){lA=rA=-Math.PI/6;}else if(st===2){lA=-Math.PI/2;rA=-Math.PI/6;}else if(st===3){lA=rA=-Math.PI/2;}else if(st===4){lA=-Math.PI*3/4;rA=-Math.PI/2;}else if(st===5){lA=rA=-Math.PI*3/4;}else{lA=rA=-Math.PI/2;hip=12;}lL=Math.PI/10;rL=-Math.PI/10;}
  else if(move==='soulja'){lA=rA=-Math.PI/2+Math.sin(t*0.3)*0.15;tilt=Math.sin(t*0.2)*0.15;lL=Math.PI/6+Math.sin(t*0.35)*0.3;rL=-Math.PI/6-Math.sin(t*0.35)*0.3;hip=Math.sin(t*0.35)*7;}
  else if(move==='floss'){const fp=Math.sin(t*0.25);lA=rA=-Math.PI/2+fp;hip=fp*14;lL=Math.PI/10;rL=-Math.PI/10;}
  else if(move==='griddy'){lL=Math.PI/3*Math.max(0,Math.sin(t*0.35+Math.PI));rL=Math.PI/3*Math.max(0,Math.sin(t*0.35));lA=-Math.PI/2-Math.sin(t*0.35+Math.PI)*0.5;rA=-Math.PI/2+Math.sin(t*0.35+Math.PI)*0.5;hip=Math.sin(t*0.35)*6;tilt=Math.sin(t*0.35)*0.08;}
  ctx.translate(x+hip,y+bounce); ctx.rotate(tilt);
  ctx.beginPath();ctx.arc(0,-s*2.2,s*0.5,0,Math.PI*2);ctx.fillStyle='#ffe0b2';ctx.fill();ctx.stroke();
  ctx.fillStyle='#333';ctx.beginPath();ctx.arc(-7,-s*2.35,2.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(7,-s*2.35,2.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(0,-s*2.1,8,0.1,Math.PI-0.1);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-s*1.7);ctx.lineTo(0,0);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-s*1.4);ctx.lineTo(Math.cos(lA)*s*1.1,-s*1.4+Math.sin(lA)*s*1.1);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-s*1.4);ctx.lineTo(Math.cos(rA)*s*1.1,-s*1.4+Math.sin(rA)*s*1.1);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(Math.PI/2+lL)*s,Math.sin(Math.PI/2+lL)*s);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(Math.PI/2+rL)*s,Math.sin(Math.PI/2+rL)*s);ctx.stroke();
  ctx.restore();
}

function showSpeechBubble(head,text){const el=document.createElement('div');el.className='speech-bubble';el.textContent=text;document.body.appendChild(el);activeBubbles.push({el,head,createdAt:Date.now(),duration:4500});}
function updateBubbles(){const now=Date.now();for(let i=activeBubbles.length-1;i>=0;i--){const b=activeBubbles[i],age=now-b.createdAt;if(age>b.duration){b.el.remove();activeBubbles.splice(i,1);continue;}if(age>b.duration-600)b.el.style.opacity=((b.duration-age)/600).toFixed(2);const hw=b.el.offsetWidth||200,hh=b.el.offsetHeight||60;b.el.style.left=(b.head.x-hw/2)+'px';b.el.style.top=(b.head.y-b.head.size-hh-14)+'px';}}

function spawnHead(){if(!gameRunning)return;const size=50+Math.random()*40,emoji=FACE_EMOJIS[Math.floor(Math.random()*FACE_EMOJIS.length)];const side=Math.floor(Math.random()*4);let x,y;if(side===0){x=-size;y=Math.random()*canvas.height;}else if(side===1){x=canvas.width+size;y=Math.random()*canvas.height;}else if(side===2){x=Math.random()*canvas.width;y=-size;}else{x=Math.random()*canvas.width;y=canvas.height+size;}const tx=canvas.width*0.3+Math.random()*canvas.width*0.4,ty=canvas.height*0.3+Math.random()*canvas.height*0.4,dx=(tx-x)/(100+Math.random()*100),dy=(ty-y)/(100+Math.random()*100);heads.push({x,y,size,dx,dy,emoji,rotation:0,rotSpeed:(Math.random()-0.5)*0.1,kicked:false});}
function spawnParticles(x,y,color){for(let i=0;i<20;i++){const a=Math.random()*Math.PI*2,sp=3+Math.random()*8;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:0.03+Math.random()*0.04,size:4+Math.random()*8,color:color||('hsl('+(Math.random()*360)+',100%,60%)')});}}
function addFT(x,y,text,color){floatingTexts.push({x,y,text,color:color||'#fff',life:1,vy:-2,size:24});}

function kickHead(head,mx,my){const dx=head.x-mx,dy=head.y-my,dist=Math.sqrt(dx*dx+dy*dy)||1,force=15+Math.random()*10;head.dx=(dx/dist)*force;head.dy=(dy/dist)*force;head.rotSpeed=(Math.random()-0.5)*0.4;head.kicked=true;head.kickTimer=200;kickCount++;comboCount++;clearTimeout(comboTimer);comboTimer=setTimeout(()=>{comboCount=0;updateCombo();},1500);const pts=comboCount*100;score+=pts;document.getElementById('score').textContent=score;document.getElementById('kicks').textContent=kickCount;updateCombo();spawnParticles(head.x,head.y);addFT(head.x,head.y-head.size,comboCount>1?'x'+comboCount+' +'+pts:'+'+pts,comboCount>2?'#ffd700':'#fff');showSpeechBubble(head,RENT_CONTROL_QUOTES[Math.floor(Math.random()*RENT_CONTROL_QUOTES.length)]);if(kickCount===20){document.getElementById('finish-btn').style.display='block';document.getElementById('instructions').innerHTML='You unlocked the QUIZ! <span style="color:#ffd700">Click TAKE THE QUIZ or keep kicking!</span>';}if(kickCount%5===0)triggerDanceParty();else showOneLiner();}
function updateCombo(){const el=document.getElementById('combo');if(comboCount>1){el.style.display='block';el.textContent='COMBO x'+comboCount+'!';}else el.style.display='none';}
function showOneLiner(){const el=document.getElementById('oneliner');el.textContent='"'+ONE_LINERS[Math.floor(Math.random()*ONE_LINERS.length)]+'"';el.style.display='block';clearTimeout(window._oneTimeout);window._oneTimeout=setTimeout(()=>{el.style.display='none';},3000);}
function showAntiRentLiner(dance){const el=document.getElementById('anti-rent-banner');el.textContent='🎤 "'+ANTI_RENT_CONTROL_LINERS[Math.floor(Math.random()*ANTI_RENT_CONTROL_LINERS.length)]+'"';el.style.borderColor=dance.color;el.style.display='block';clearTimeout(window._antiTimeout);window._antiTimeout=setTimeout(()=>{el.style.display='none';},5000);}
function triggerDanceParty(){if(isDancing)return;isDancing=true;const dance=DECADEDANCES[Math.floor(Math.random()*DECADEDANCES.length)];const el=document.getElementById('dance-label');el.innerHTML=dance.emoji+' '+dance.decade+' — '+dance.name+' '+dance.emoji;el.style.color=dance.color;el.style.display='block';player.dancing=true;player.dance=dance;player.danceFrame=0;player.danceDuration=180;heads.forEach(h=>{h.dancing=true;h.danceAngle=Math.random()*Math.PI*2;h.danceSpeed=0.05+Math.random()*0.05;});for(let i=0;i<6;i++)setTimeout(()=>spawnParticles(Math.random()*canvas.width,Math.random()*canvas.height,'hsl('+(Math.random()*360)+',100%,60%)'),i*150);setTimeout(()=>{el.style.display='none';heads.forEach(h=>{h.dancing=false;});player.dancing=false;isDancing=false;showAntiRentLiner(dance);},3100);}

canvas.addEventListener('click',(e)=>{if(!gameRunning)return;const rect=canvas.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;let hit=false;for(let i=heads.length-1;i>=0;i--){const h=heads[i];if(Math.sqrt((h.x-mx)**2+(h.y-my)**2)<h.size){kickHead(h,mx,my);hit=true;break;}}if(!hit){spawnParticles(mx,my,'#ff0000');addFT(mx,my,'MISS!','#ff4444');comboCount=0;updateCombo();}});

function drawHead(h){ctx.save();ctx.translate(h.x,h.y);ctx.rotate(h.rotation);ctx.beginPath();ctx.arc(4,4,h.size,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fill();ctx.beginPath();ctx.arc(0,0,h.size,0,Math.PI*2);ctx.fillStyle=h.kicked?'#ffcc99':'#ffd1a0';ctx.fill();ctx.strokeStyle=h.kicked?'#c0392b':'#8B4513';ctx.lineWidth=h.kicked?4:3;ctx.stroke();ctx.font=(h.size*1.1)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(h.kicked?'\u{1F5E3}\uFE0F':h.emoji,0,2);ctx.restore();}

let spawnTimer=0,frameCount=0;
function gameLoop(){if(!gameRunning){requestAnimationFrame(gameLoop);return;}frameCount++;ctx.clearRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=1;for(let x=0;x<canvas.width;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke();}for(let y=0;y<canvas.height;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke();}spawnTimer++;if(spawnTimer>90&&heads.length<12){spawnHead();spawnTimer=0;}for(let i=heads.length-1;i>=0;i--){const h=heads[i];if(h.dancing){h.danceAngle+=h.danceSpeed;h.x+=Math.cos(h.danceAngle)*3;h.y+=Math.sin(h.danceAngle*1.3)*3;}else{h.x+=h.dx;h.y+=h.dy;h.dx*=0.99;h.dy*=0.99;}h.rotation+=h.rotSpeed;if(h.x-h.size<0){h.x=h.size;h.dx=Math.abs(h.dx);}if(h.x+h.size>canvas.width){h.x=canvas.width-h.size;h.dx=-Math.abs(h.dx);}if(h.y-h.size<0){h.y=h.size;h.dy=Math.abs(h.dy);}if(h.y+h.size>canvas.height){h.y=canvas.height-h.size;h.dy=-Math.abs(h.dy);}if(h.kickTimer>0)h.kickTimer--;drawHead(h);if(!h.kicked&&!h.dancing&&(h.x<-200||h.x>canvas.width+200||h.y<-200||h.y>canvas.height+200))heads.splice(i,1);}for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life-=p.decay;if(p.life<=0){particles.splice(i,1);continue;}ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fillStyle=p.color;ctx.globalAlpha=p.life;ctx.fill();ctx.globalAlpha=1;}for(let i=floatingTexts.length-1;i>=0;i--){const t=floatingTexts[i];t.y+=t.vy;t.life-=0.02;if(t.life<=0){floatingTexts.splice(i,1);continue;}ctx.font='bold '+t.size+'px Arial';ctx.textAlign='center';ctx.fillStyle=t.color;ctx.globalAlpha=t.life;ctx.strokeStyle='#000';ctx.lineWidth=3;ctx.strokeText(t.text,t.x,t.y);ctx.fillText(t.text,t.x,t.y);ctx.globalAlpha=1;}if(player.dancing&&player.dance){player.danceFrame++;const px=canvas.width/2,py=canvas.height-80;const grad=ctx.createRadialGradient(px,py+10,10,px,py+10,80);grad.addColorStop(0,player.dance.color+'aa');grad.addColorStop(1,'transparent');ctx.beginPath();ctx.ellipse(px,py+12,75,22,0,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill();ctx.font='bold 15px Arial';ctx.textAlign='center';ctx.fillStyle=player.dance.color;ctx.globalAlpha=0.9;ctx.fillText('YOU',px,py-90);ctx.globalAlpha=1;drawStickFigure(px,py,player.danceFrame,player.dance.move,player.dance.color);if(player.danceFrame>=player.danceDuration){player.dancing=false;player.dance=null;}}updateBubbles();requestAnimationFrame(gameLoop);}
for(let i=0;i<5;i++)setTimeout(spawnHead,i*300);
gameLoop();
</script>
</body>
</html>
